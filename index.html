<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
        <title>Wrand.cc — R&D Domain Graph</title>
        <meta
            name="description"
            content="Interactive graph of the Wrand.cc R&D portfolio — 23 domains mapped as a navigable network."
        />
        <link
            href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg: #08090c;
                --bg2: #0e1015;
                --surface: #13151c;
                --surface-hover: #1a1d28;
                --border: #1e2130;
                --border-bright: #2a2e44;
                --text: #d4d7e5;
                --text-dim: #6b7094;
                --text-muted: #3d4160;
                --cyan: #00d9ff;
                --green: #00e87b;
                --purple: #8b5cf6;
                --pink: #f472b6;
                --orange: #fb923c;
                --gold: #fbbf24;
                --red: #ef4444;
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: var(--bg);
                color: var(--text);
                font-family: "IBM Plex Mono", monospace;
            }

            /* ── CANVAS ── */
            #graph-canvas {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 1;
            }

            /* ── HEADER ── */
            .hud-top {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 100;
                height: 50px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 1.5rem;
                background: rgba(8, 9, 12, 0.85);
                backdrop-filter: blur(16px);
                border-bottom: 1px solid var(--border);
            }
            .hud-logo {
                font-family: "Instrument Serif", serif;
                font-size: 1.4rem;
                font-style: italic;
                color: var(--text);
                letter-spacing: -0.02em;
            }
            .hud-logo em {
                color: var(--cyan);
                font-style: italic;
            }
            .hud-stats {
                display: flex;
                gap: 1.5rem;
                align-items: center;
            }
            .hud-stat {
                display: flex;
                align-items: baseline;
                gap: 0.35rem;
                font-size: 0.7rem;
            }
            .hud-stat b {
                color: var(--cyan);
                font-size: 0.85rem;
                font-weight: 600;
            }
            .hud-stat span {
                color: var(--text-dim);
                text-transform: uppercase;
                letter-spacing: 0.08em;
                font-size: 0.6rem;
            }
            .hud-amp {
                text-decoration: none;
                color: var(--gold);
                font-size: 1.1rem;
                font-weight: 700;
                padding: 0.3rem 0.6rem;
                border-radius: 6px;
                border: 1px solid transparent;
                transition: all 0.2s;
            }
            .hud-amp:hover {
                border-color: rgba(251, 191, 36, 0.4);
                background: rgba(251, 191, 36, 0.06);
            }

            /* ── FILTER BAR ── */
            .filter-bar {
                position: fixed;
                bottom: 1.2rem;
                left: 50%;
                transform: translateX(-50%);
                z-index: 100;
                display: flex;
                gap: 0.4rem;
                padding: 0.4rem;
                background: rgba(14, 16, 21, 0.9);
                backdrop-filter: blur(16px);
                border: 1px solid var(--border);
                border-radius: 10px;
            }
            .filter-btn {
                font-family: "IBM Plex Mono", monospace;
                font-size: 0.65rem;
                font-weight: 500;
                padding: 0.4rem 0.8rem;
                border: none;
                border-radius: 6px;
                background: transparent;
                color: var(--text-dim);
                cursor: pointer;
                letter-spacing: 0.05em;
                text-transform: uppercase;
                transition: all 0.2s;
                white-space: nowrap;
            }
            .filter-btn:hover {
                color: var(--text);
                background: var(--surface);
            }
            .filter-btn.active {
                color: var(--cyan);
                background: rgba(0, 217, 255, 0.1);
            }

            /* ── NODE CARDS ── */
            .node-card {
                position: absolute;
                z-index: 50;
                width: 220px;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 8px;
                overflow: hidden;
                cursor: grab;
                transition:
                    box-shadow 0.3s,
                    border-color 0.3s,
                    opacity 0.3s;
                user-select: none;
                opacity: 0;
                animation: nodeAppear 0.5s ease forwards;
            }
            .node-card:active {
                cursor: grabbing;
                z-index: 60;
            }
            .node-card:hover {
                border-color: var(--border-bright);
                box-shadow:
                    0 8px 40px rgba(0, 0, 0, 0.5),
                    0 0 20px rgba(0, 217, 255, 0.06);
            }
            .node-card.dimmed {
                opacity: 0.12 !important;
                pointer-events: none;
            }
            @keyframes nodeAppear {
                from {
                    opacity: 0;
                    transform: scale(0.85);
                }
                to {
                    opacity: 1;
                    transform: scale(1);
                }
            }

            /* browser chrome */
            .card-chrome {
                display: flex;
                align-items: center;
                gap: 0.35rem;
                padding: 0.4rem 0.6rem;
                background: var(--bg2);
                border-bottom: 1px solid var(--border);
            }
            .chrome-dot {
                width: 7px;
                height: 7px;
                border-radius: 50%;
            }
            .chrome-dot.r {
                background: #ef4444;
            }
            .chrome-dot.y {
                background: #fbbf24;
            }
            .chrome-dot.g {
                background: #22c55e;
            }
            .chrome-url {
                flex: 1;
                margin-left: 0.4rem;
                font-size: 0.55rem;
                color: var(--text-dim);
                background: var(--bg);
                padding: 0.2rem 0.5rem;
                border-radius: 4px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                letter-spacing: 0.02em;
            }
            /* card body */
            .card-body {
                padding: 0.8rem;
            }
            .card-name {
                font-family: "Instrument Serif", serif;
                font-size: 1rem;
                font-weight: 400;
                font-style: italic;
                margin-bottom: 0.25rem;
                color: var(--text);
            }
            .card-tagline {
                font-size: 0.65rem;
                color: var(--text-dim);
                line-height: 1.45;
                margin-bottom: 0.5rem;
            }
            .card-tags {
                display: flex;
                flex-wrap: wrap;
                gap: 0.25rem;
            }
            .card-tag {
                font-size: 0.5rem;
                padding: 0.15rem 0.4rem;
                border-radius: 3px;
                letter-spacing: 0.06em;
                text-transform: uppercase;
                font-weight: 600;
            }

            /* tag colors by category */
            .tag-infra {
                background: rgba(0, 217, 255, 0.12);
                color: var(--cyan);
            }
            .tag-agent {
                background: rgba(0, 232, 123, 0.12);
                color: var(--green);
            }
            .tag-creative {
                background: rgba(244, 114, 182, 0.12);
                color: var(--pink);
            }
            .tag-lang {
                background: rgba(139, 92, 246, 0.12);
                color: var(--purple);
            }
            .tag-data {
                background: rgba(251, 191, 36, 0.12);
                color: var(--gold);
            }
            .tag-brand {
                background: rgba(251, 146, 60, 0.12);
                color: var(--orange);
            }
            .tag-observe {
                background: rgba(239, 68, 68, 0.12);
                color: var(--red);
            }

            /* card-link overlay */
            .card-visit {
                display: block;
                text-align: center;
                padding: 0.4rem;
                font-size: 0.55rem;
                color: var(--text-muted);
                text-decoration: none;
                border-top: 1px solid var(--border);
                transition: all 0.2s;
                letter-spacing: 0.08em;
                text-transform: uppercase;
            }
            .card-visit:hover {
                color: var(--cyan);
                background: rgba(0, 217, 255, 0.04);
            }

            /* ── MINIMAP ── */
            .minimap {
                position: fixed;
                bottom: 4rem;
                right: 1.2rem;
                z-index: 90;
                width: 140px;
                height: 100px;
                background: rgba(14, 16, 21, 0.85);
                backdrop-filter: blur(10px);
                border: 1px solid var(--border);
                border-radius: 6px;
                overflow: hidden;
            }
            .minimap canvas {
                width: 100%;
                height: 100%;
            }

            /* ── RESPONSIVE ── */
            @media (max-width: 768px) {
                .hud-stats {
                    display: none;
                }
                .filter-bar {
                    bottom: 0.8rem;
                    overflow-x: auto;
                    max-width: 95vw;
                }
                .filter-bar::-webkit-scrollbar {
                    display: none;
                }
                .node-card {
                    width: 170px;
                }
                .card-name {
                    font-size: 0.9rem;
                }
                .minimap {
                    display: none;
                }
            }
        </style>
    </head>
    <body>
        <!-- HUD -->
        <div class="hud-top">
            <div class="hud-logo"><em>Wrand</em>.cc</div>
            <div class="hud-stats">

            <a
                class="hud-amp"
                href="https://ampersandboxdesign.com"
                target="_blank"
                rel="noopener"

        </div>

        <!-- FILTER -->
        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">All 23</button>
            <button class="filter-btn" data-filter="agent">Agent Stack</button>
            <button class="filter-btn" data-filter="infra">Infra</button>
            <button class="filter-btn" data-filter="lang">Dev Tools</button>
            <button class="filter-btn" data-filter="creative">Products</button>

            <button class="filter-btn" data-filter="brand">Brand</button>
            <button class="filter-btn" data-filter="observe">Observe</button>
        </div>

        <!-- MINIMAP -->
        <div class="minimap"><canvas id="minimap-canvas"></canvas></div>

        <!-- CANVAS for edges -->
        <canvas id="graph-canvas"></canvas>

        <!-- cards injected by JS -->
        <div id="card-container"></div>

        <script>
            // ═══════════════════════════════════════════
            // DOMAIN DATA — all 23
            // ═══════════════════════════════════════════
            const domains = [

                {
                    id: "specprompt",

                {

                // ── Observability ──
                {

                    name: "a2atraffic.com",
                    label: "A2A Traffic",
                    url: "https://a2atraffic.com",
                    tagline:
                        "A2A protocol monitoring. The observability layer above the stack.",
                    tags: ["observe"],

                },

                // ── Brand / Identity ──
                {
                    id: "wrand",
                    name: "wrand.cc",
                    label: "Wrand.cc",
                    url: "https://wrand.cc",
                    tagline: "R&D portfolio company. You are here.",
                    tags: ["brand"],
                    cat: "brand",
                },
                {
                    id: "istrav",
                    name: "istrav.com",
                    label: "isTrav",
                    url: "https://istrav.com",
                    tagline: "Core business entity. Web solutions hub.",
                    tags: ["brand"],
                    cat: "brand",
                },
                {
                    id: "traaviis",
                    name: "traaviis.com",
                    label: "Traaviis",
                    url: "https://traaviis.com",
                    tagline: "Personal brand. Building.",

                    cat: "brand",
                },
                {
                    id: "subvind",
                    name: "subvind.com",
                    label: "Subvind",
                    url: "https://subvind.com",
                    tagline: "Open-source dev portfolio. NestJS microservices.",
                    tags: ["brand"],
                    cat: "brand",
                },
                {
                    id: "cul8er",
                    name: "c-u-l8er.link",
                    label: "C-U-L8er",
                    url: "https://c-u-l8er.link",
                    tagline: "C U L8er LLC. GitHub identity & link brand.",

                    cat: "brand",
                },
            ];

            // ═══════════════════════════════════════════
            // EDGES — validated relationships
            // ═══════════════════════════════════════════
            const edges = [
                // [&] hub — connected to everything in the ecosystem
                { from: "ampersandboxdesign", to: "fleetprompt", s: 0.9 },
                { from: "ampersandboxdesign", to: "webhost", s: 0.8 },
                { from: "ampersandboxdesign", to: "a2atraffic", s: 0.7 },
                { from: "ampersandboxdesign", to: "delegatic", s: 0.85 },
                { from: "ampersandboxdesign", to: "specprompt", s: 0.7 },
                { from: "ampersandboxdesign", to: "deliberatic", s: 0.7 },
                { from: "ampersandboxdesign", to: "agentelic", s: 0.75 },
                { from: "ampersandboxdesign", to: "agentromatic", s: 0.7 },
                { from: "ampersandboxdesign", to: "graphonomous", s: 0.8 },
                { from: "ampersandboxdesign", to: "geofleetic", s: 0.75 },
                { from: "ampersandboxdesign", to: "ticktickclock", s: 0.7 },
                { from: "ampersandboxdesign", to: "opensentience", s: 0.75 },
                { from: "ampersandboxdesign", to: "bendscript", s: 0.6 },
                // Agent platform chain (stack order: delegatic → specprompt → deliberatic → agentelic → agentromatic → fleetprompt)
                { from: "delegatic", to: "specprompt", s: 0.9 },
                { from: "delegatic", to: "deliberatic", s: 0.85 },
                { from: "delegatic", to: "agentromatic", s: 0.7 },
                { from: "specprompt", to: "agentelic", s: 0.8 },
                { from: "deliberatic", to: "graphonomous", s: 0.9 }, // cognitive pair: decide + know
                { from: "agentelic", to: "fleetprompt", s: 0.9 }, // build → publish
                { from: "agentromatic", to: "fleetprompt", s: 0.8 }, // automate → distribute
                { from: "agentromatic", to: "deliberatic", s: 0.6 }, // inherits deliberation
                { from: "fleetprompt", to: "delegatic", s: 0.7 }, // registry → governance
                { from: "fleetprompt", to: "specprompt", s: 0.8 }, // every skill has a spec
                // Cognitive primitives
                { from: "graphonomous", to: "geofleetic", s: 0.85 }, // graph + spatial
                { from: "graphonomous", to: "ticktickclock", s: 0.8 }, // graph + temporal
                { from: "geofleetic", to: "ticktickclock", s: 0.7 }, // spatial + temporal
                { from: "geofleetic", to: "gpscoord", s: 0.85 }, // geospatial → GPS
                { from: "graphonomous", to: "fleetprompt", s: 0.6 }, // learning → skills
                // Infrastructure
                { from: "webhost", to: "opensentience", s: 0.85 }, // hosting → runtime
                { from: "webhost", to: "fleetprompt", s: 0.8 }, // hosting → platform
                { from: "webhost", to: "gpscoord", s: 0.7 }, // hosting → fleet tracking
                { from: "opensentience", to: "delegatic", s: 0.7 }, // runtime respects governance
                { from: "opensentience", to: "graphonomous", s: 0.6 }, // runtime connects to graph MCP
                // Languages / tools
                { from: "bendscript", to: "a2atraffic", s: 0.7 }, // agent diagnostics → observability
                { from: "bendscript", to: "opensentience", s: 0.6 }, // diagnostics → runtime
                { from: "bendscript", to: "fleetprompt", s: 0.5 }, // diagnostics as skills
                { from: "alkeyword", to: "bendscript", s: 0.5 }, // Elixir types → Elixir diagnostics
                { from: "alkeyword", to: "specprompt", s: 0.4 }, // type safety → specs

                { from: "a2atraffic", to: "fleetprompt", s: 0.8 }, // watches the marketplace
                { from: "a2atraffic", to: "delegatic", s: 0.6 }, // watches governance

                { from: "runefort", to: "wrand", s: 0.4 },

                // Brand cluster
                //

                { from: "wrand", to: "traaviis", s: 0.7 },
                { from: "wrand", to: "cul8er", s: 0.5 },
                // printing

                { from: "cul8er", to: "alkeyword", s: 0.5 },
                { from: "cul8er", to: "brokenrecord", s: 0.4 },
                // building
                { from: "traaviis", to: "fleetprompt", s: 0.9 },
                { from: "traaviis", to: "ticktickclock", s: 0.8 },
                { from: "traaviis", to: "graphonomous", s: 0.7 },
                { from: "traaviis", to: "webhost", s: 0.6 },
                { from: "traaviis", to: "geofleetic", s: 0.5 },
                { from: "traaviis", to: "gpscoord", s: 0.4 },
                { from: "traaviis", to: "a2atraffic", s: 0.4 },
                { from: "traaviis", to: "ampersandboxdesign", s: 0.4 },
                // origin
                { from: "istrav", to: "subvind", s: 0.6 },
                { from: "subvind", to: "traaviis", s: 0.6 },

            // ═══════════════════════════════════════════
            // SETUP
            // ═══════════════════════════════════════════
            const canvas = document.getElementById("graph-canvas");
            const ctx = canvas.getContext("2d");
            const container = document.getElementById("card-container");
            let W, H;
            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener("resize", resize);

            const catColors = {
                brand: "#fb923c",
                agent: "#00e87b",
                infra: "#00d9ff",
                lang: "#8b5cf6",
                creative: "#f472b6",
                data: "#fbbf24",
                observe: "#ef4444",
            };

            // Create nodes with physics
            const nodes = domains.map((d, i) => {
                const angle = (i / domains.length) * Math.PI * 2;
                const radius = Math.min(W, H) * 0.3;
                return {
                    ...d,
                    hidden: false,
                    x:
                        W / 2 +
                        Math.cos(angle) * radius +
                        (Math.random() - 0.5) * 100,
                    y:
                        H / 2 +
                        40 +
                        Math.sin(angle) * radius +
                        (Math.random() - 0.5) * 100,
                    vx: 0,
                    vy: 0,
                    fx: 0,
                    fy: 0,
                    pinned: false,
                    el: null,
                };
            });
            const nodeMap = {};
            nodes.forEach((n) => (nodeMap[n.id] = n));

            // Stats
            document.getElementById("totalEdges").textContent = edges.length;

            // ── Create DOM cards ──
            nodes.forEach((node, i) => {
                const card = document.createElement("div");
                card.className = "node-card";
                card.dataset.id = node.id;
                card.dataset.cat = node.cat;
                card.style.animationDelay = i * 0.04 + "s";
                const col = catColors[node.cat];
                card.innerHTML = `
    <div class="card-chrome">
      <div class="chrome-dot r"></div>
      <div class="chrome-dot y"></div>
      <div class="chrome-dot g"></div>
      <div class="chrome-url">${node.name}</div>
    </div>
    <div class="card-body">
      <div class="card-name">${node.label}</div>
      <div class="card-tagline">${node.tagline}</div>
      <div class="card-tags">
        ${node.tags.map((t) => `<span class="card-tag tag-${t}">${t}</span>`).join("")}
      </div>
    </div>
    <a class="card-visit" href="${node.url}" target="_blank" rel="noopener">Visit Site →</a>
  `;
                card.style.borderTop = `2px solid ${col}`;
                container.appendChild(card);
                node.el = card;

                // Drag
                let dragging = false,
                    ox,
                    oy;
                const onDown = (e) => {
                    if (e.target.closest(".card-visit")) return;
                    dragging = true;
                    node.pinned = true;
                    const pt = e.touches ? e.touches[0] : e;
                    ox = pt.clientX - node.x;
                    oy = pt.clientY - node.y;
                    card.style.zIndex = 60;
                    e.preventDefault();
                };
                const onMove = (e) => {
                    if (!dragging) return;
                    const pt = e.touches ? e.touches[0] : e;
                    node.x = pt.clientX - ox;
                    node.y = pt.clientY - oy;
                    node.vx = 0;
                    node.vy = 0;
                    e.preventDefault();
                };
                const onUp = () => {
                    if (!dragging) return;
                    dragging = false;
                    node.pinned = false;
                    card.style.zIndex = 50;
                };
                card.addEventListener("mousedown", onDown);
                card.addEventListener("touchstart", onDown, { passive: false });
                window.addEventListener("mousemove", onMove);
                window.addEventListener("touchmove", onMove, {
                    passive: false,
                });
                window.addEventListener("mouseup", onUp);
                window.addEventListener("touchend", onUp);

                // Hover highlight
                card.addEventListener("mouseenter", () =>
                    highlightNode(node.id),
                );
                card.addEventListener("mouseleave", () => clearHighlight());
            });

            // Highlight
            let highlightedId = null;
            function highlightNode(id) {
                highlightedId = id;
                const connected = new Set([id]);
                edges.forEach((e) => {
                    if (e.from === id) connected.add(e.to);
                    if (e.to === id) connected.add(e.from);
                });
                nodes.forEach((n) => {
                    n.el.classList.toggle("dimmed", !connected.has(n.id));
                });
            }
            function clearHighlight() {
                highlightedId = null;
                nodes.forEach((n) => {
                    if (!n.hidden) n.el.classList.remove("dimmed");
                });
            }

            // Filter
            let activeFilter = "all";
            document.querySelectorAll(".filter-btn").forEach((btn) => {
                btn.addEventListener("click", () => {
                    document
                        .querySelectorAll(".filter-btn")
                        .forEach((b) => b.classList.remove("active"));
                    btn.classList.add("active");
                    activeFilter = btn.dataset.filter;
                    nodes.forEach((n) => {
                        const show =
                            activeFilter === "all" || n.cat === activeFilter;
                        n.hidden = !show;
                        n.el.style.display = show ? "" : "none";
                        n.el.classList.remove("dimmed");
                    });
                });
            });

            // ═══════════════════════════════════════════
            // FORCE SIMULATION
            // ═══════════════════════════════════════════
            const SIM = {
                repulsion: 16000,
                attraction: 0.00035,
                edgeLen: 280,
                damping: 0.86,
                centerPull: 0.00012,
                maxSpd: 3.5,
            };

            function simulate() {
                nodes.forEach((n) => {
                    n.fx = 0;
                    n.fy = 0;
                });
                for (let i = 0; i < nodes.length; i++) {
                    for (let j = i + 1; j < nodes.length; j++) {
                        const a = nodes[i],
                            b = nodes[j];
                        let dx = a.x - b.x,
                            dy = a.y - b.y;
                        let d = Math.sqrt(dx * dx + dy * dy) || 1;
                        if (d > 900) continue;
                        const f = SIM.repulsion / (d * d);
                        const fx = (dx / d) * f,
                            fy = (dy / d) * f;
                        a.fx += fx;
                        a.fy += fy;
                        b.fx -= fx;
                        b.fy -= fy;
                    }
                }
                edges.forEach((e) => {
                    const a = nodeMap[e.from],
                        b = nodeMap[e.to];
                    if (!a || !b) return;
                    let dx = b.x - a.x,
                        dy = b.y - a.y,
                        d = Math.sqrt(dx * dx + dy * dy) || 1;
                    const disp = d - SIM.edgeLen;
                    const f = disp * SIM.attraction * (e.s || 0.5);
                    const fx = (dx / d) * f,
                        fy = (dy / d) * f;
                    a.fx += fx;
                    a.fy += fy;
                    b.fx -= fx;
                    b.fy -= fy;
                });
                nodes.forEach((n) => {
                    n.fx += (W / 2 - n.x) * SIM.centerPull;
                    n.fy += (H / 2 + 30 - n.y) * SIM.centerPull;
                });
                nodes.forEach((n) => {
                    if (n.pinned) return;
                    n.vx = (n.vx + n.fx) * SIM.damping;
                    n.vy = (n.vy + n.fy) * SIM.damping;
                    const spd = Math.sqrt(n.vx * n.vx + n.vy * n.vy);
                    if (spd > SIM.maxSpd) {
                        n.vx = (n.vx / spd) * SIM.maxSpd;
                        n.vy = (n.vy / spd) * SIM.maxSpd;
                    }
                    n.x += n.vx;
                    n.y += n.vy;
                    n.x = Math.max(120, Math.min(W - 120, n.x));
                    n.y = Math.max(140, Math.min(H - 90, n.y));
                });
            }

            // ═══════════════════════════════════════════
            // RENDER
            // ═══════════════════════════════════════════
            function drawEdges() {
                ctx.clearRect(0, 0, W, H);
                // Subtle grid
                ctx.strokeStyle = "#111325";
                ctx.lineWidth = 0.5;
                ctx.globalAlpha = 0.4;
                for (let x = 0; x < W; x += 80) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, H);
                    ctx.stroke();
                }
                for (let y = 0; y < H; y += 80) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(W, y);
                    ctx.stroke();
                }
                ctx.globalAlpha = 1;

                edges.forEach((e) => {
                    const a = nodeMap[e.from],
                        b = nodeMap[e.to];
                    if (!a || !b) return;
                    if (activeFilter !== "all" && a.hidden && b.hidden) return;

                    const hl =
                        highlightedId &&
                        (e.from === highlightedId || e.to === highlightedId);
                    const alpha = hl ? 0.5 : highlightedId ? 0.03 : 0.1;
                    const width = hl ? 2 : 0.7;
                    const col = catColors[a.cat] || "#444";

                    ctx.beginPath();
                    ctx.moveTo(a.x, a.y);
                    ctx.lineTo(b.x, b.y);
                    ctx.strokeStyle = col;
                    ctx.globalAlpha = alpha;
                    ctx.lineWidth = width;
                    ctx.stroke();

                    // Animated dot on highlighted edges
                    if (hl) {
                        const t = (Date.now() % 2200) / 2200;
                        const px = a.x + (b.x - a.x) * t,
                            py = a.y + (b.y - a.y) * t;
                        ctx.globalAlpha = 0.9;
                        ctx.beginPath();
                        ctx.arc(px, py, 3, 0, Math.PI * 2);
                        ctx.fillStyle = col;
                        ctx.fill();
                    }
                });
                ctx.globalAlpha = 1;
            }

            function positionCards() {
                nodes.forEach((n) => {
                    if (n.hidden) return;
                    const cw = 220,
                        ch = n.el.offsetHeight || 160;
                    n.el.style.left = n.x - cw / 2 + "px";
                    n.el.style.top = n.y - ch / 2 + "px";
                });
            }

            // Minimap
            const mmC = document.getElementById("minimap-canvas");
            const mmX = mmC.getContext("2d");
            function drawMinimap() {
                mmC.width = 140;
                mmC.height = 100;
                mmX.clearRect(0, 0, 140, 100);
                const sx = 140 / W,
                    sy = 100 / H;
                mmX.strokeStyle = "#1e2130";
                mmX.lineWidth = 0.5;
                edges.forEach((e) => {
                    const a = nodeMap[e.from],
                        b = nodeMap[e.to];
                    if (!a || !b) return;
                    mmX.beginPath();
                    mmX.moveTo(a.x * sx, a.y * sy);
                    mmX.lineTo(b.x * sx, b.y * sy);
                    mmX.stroke();
                });
                nodes.forEach((n) => {
                    mmX.fillStyle = catColors[n.cat] || "#666";
                    mmX.globalAlpha = n.hidden ? 0.1 : 0.8;
                    mmX.beginPath();
                    mmX.arc(n.x * sx, n.y * sy, 2.5, 0, Math.PI * 2);
                    mmX.fill();
                });
                mmX.globalAlpha = 1;
            }

            let frame = 0;
            function loop() {
                simulate();
                drawEdges();
                positionCards();
                if (frame % 5 === 0) drawMinimap();
                frame++;
                requestAnimationFrame(loop);
            }
            loop();
        </script>
    </body>
</html>
